name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm install
        working-directory: cli
      - run: npm test
        working-directory: cli

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm install
        working-directory: client
      - run: npm test -- --watchAll=false --ci
        working-directory: client

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm install
        working-directory: client
      - run: npx eslint src/ --ext .js,.jsx --max-warnings 0
        working-directory: client

  pack:
    name: Verify npm pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm install
        working-directory: cli
      - run: npm run build
        working-directory: cli
      - run: npm pack --dry-run
        working-directory: cli
